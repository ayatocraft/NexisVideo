<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexis Video</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
  margin:0;
  background:#0f0f14;
  color:white;
  font-family:sans-serif;
  text-align:center;
}

video{
  width:45%;
  background:black;
  border-radius:12px;
}

.controls{
  margin-top:15px;
}

button{
  padding:12px;
  font-size:16px;
  margin:5px;
  border-radius:8px;
  border:none;
}

.hidden{
  display:none;
}
</style>
</head>
<body>

<h2>Nexis Video</h2>
<div id="status">接続中...</div>

<div>
  <video id="localVideo" autoplay playsinline muted></video>
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<!-- 参加ボタン -->
<div id="joinUI" class="controls">
  <button id="joinBtn" onclick="joinCall()">参加</button>
</div>

<!-- 通話中コントロール -->
<div id="callUI" class="controls hidden">
  <button onclick="toggleMute()">🎤</button>
  <button onclick="toggleCamera()">📷</button>
  <button onclick="switchCamera()">🔄</button>
  <button onclick="endCall()">❌ 終了</button>
</div>

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<script>
const ABLY_KEY = "JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY";

let myId = localStorage.getItem("nexis_id");
if(!myId){
  myId = crypto.randomUUID();
  localStorage.setItem("nexis_id",myId);
}

const params = new URLSearchParams(location.search);
const targetId = params.get("to");
if(!targetId){
  document.getElementById("status").innerText="相手IDがありません";
  throw "no target";
}

const roomId = [myId,targetId].sort().join("-");

const ably = new Ably.Realtime({
  key: ABLY_KEY,
  clientId: myId
});

const channel = ably.channels.get(roomId);

let localStream;
let peer = null;
let joined = {};
let audioEnabled = true;
let videoEnabled = true;
let currentFacing = "user";

const localVideo = document.getElementById("localVideo");
const remoteVideo = document.getElementById("remoteVideo");
const joinBtn = document.getElementById("joinBtn");
const joinUI = document.getElementById("joinUI");
const callUI = document.getElementById("callUI");

async function initMedia(){
  localStream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:currentFacing},
    audio:true
  });
  localVideo.srcObject = localStream;
}
initMedia();

function showCallUI(){
  joinUI.classList.add("hidden");
  callUI.classList.remove("hidden");
  document.getElementById("status").innerText="通話中";
}

function createPeer(){
  peer = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(track=>{
    peer.addTrack(track,localStream);
  });

  peer.ontrack = e=>{
    remoteVideo.srcObject = e.streams[0];
  };

  peer.onicecandidate = e=>{
    if(e.candidate){
      channel.publish("signal",{candidate:e.candidate,from:myId});
    }
  };
}

async function startCall(){
  createPeer();
  const offer = await peer.createOffer();
  await peer.setLocalDescription(offer);
  channel.publish("signal",{offer,from:myId});
  showCallUI();
}

channel.subscribe("signal", async msg=>{
  const data = msg.data;
  if(data.from === myId) return;

  if(data.offer){
    if(!peer) createPeer();
    await peer.setRemoteDescription(new RTCSessionDescription(data.offer));
    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);
    channel.publish("signal",{answer,from:myId});
    showCallUI();
  }

  if(data.answer){
    if(peer.signalingState !== "stable"){
      await peer.setRemoteDescription(new RTCSessionDescription(data.answer));
    }
  }

  if(data.candidate && peer){
    try{
      await peer.addIceCandidate(new RTCIceCandidate(data.candidate));
    }catch(e){}
  }
});

channel.subscribe("join", msg=>{
  joined[msg.data.id] = true;

  if(joined[myId] && joined[targetId]){
    if(myId < targetId){
      if(!peer) startCall();
    }
  }
});

function joinCall(){
  joinBtn.disabled = true;
  joinBtn.innerText = "参加済み";
  joined[myId] = true;
  channel.publish("join",{id:myId});
}

function toggleMute(){
  audioEnabled = !audioEnabled;
  localStream.getAudioTracks().forEach(t=>t.enabled=audioEnabled);
}

function toggleCamera(){
  videoEnabled = !videoEnabled;
  localStream.getVideoTracks().forEach(t=>t.enabled=videoEnabled);
}

async function switchCamera(){
  currentFacing = currentFacing === "user" ? "environment" : "user";

  const newStream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:currentFacing},
    audio:true
  });

  const videoTrack = newStream.getVideoTracks()[0];
  const sender = peer.getSenders().find(s=>s.track.kind==="video");
  if(sender) sender.replaceTrack(videoTrack);

  localStream.getTracks().forEach(t=>t.stop());
  localStream = newStream;
  localVideo.srcObject = newStream;
}

function endCall(){
  if(peer){
    peer.close();
    peer=null;
  }
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }

  // Chat画面に戻す
  window.location.href = "https://ayatocraft.github.io/NexisChat/index.html"; 
}
</script>

</body>
</html>
