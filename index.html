<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nexis Video</title>

<script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
body{background:#0f0f14;color:white;font-family:sans-serif;text-align:center}
button{padding:10px 20px;margin:10px;background:#4f46e5;color:white;border:none;border-radius:8px}
video{width:45%;background:black;border-radius:12px;margin:5px}
.hidden{display:none}
</style>
</head>
<body>

<h2>Nexis Video</h2>

<div id="waitScreen">
  <p id="waitText">接続待機中...</p>
</div>

<div id="previewScreen" class="hidden">
  <h3>カメラ確認</h3>
  <video id="localPreview" autoplay playsinline muted></video>
  <br>
  <button onclick="joinCall()">参加</button>
</div>

<div id="callScreen" class="hidden">
  <video id="localVideo" autoplay playsinline muted></video>
  <video id="remoteVideo" autoplay playsinline></video>
  <br>
  <button onclick="toggleMic()">Mic</button>
  <button onclick="toggleCam()">Cam</button>
  <button onclick="endCall()">終了</button>
</div>

<script>
/* ========= 設定 ========= */
const ABLY_KEY = "JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY";
const ably = new Ably.Realtime(ABLY_KEY);

/* ========= ID取得 ========= */
const params = new URLSearchParams(location.search);
const myId = localStorage.getItem("nexis_id");
const targetId = params.get("to");

if(!myId || !targetId){
  alert("IDエラー");
}

/* ========= チャンネル統一 ========= */
const roomId = [myId,targetId].sort().join("-");
const channel = ably.channels.get("call-"+roomId);

/* ========= 状態管理 ========= */
let localStream;
let peer;
let readyMembers = new Set();
let joinedMembers = new Set();

/* ========= 待機状態 ========= */
channel.presence.enter(myId);

channel.presence.subscribe("enter", member=>{
  readyMembers.add(member.clientId);
  checkReady();
});

channel.presence.get().then(members=>{
  members.forEach(m=>readyMembers.add(m.clientId));
  checkReady();
});

function checkReady(){
  if(readyMembers.has(myId) && readyMembers.has(targetId)){
    document.getElementById("waitScreen").classList.add("hidden");
    startPreview();
  }else{
    document.getElementById("waitText").innerText=
      "相手を待っています...";
  }
}

/* ========= プレビュー ========= */
async function startPreview(){
  document.getElementById("previewScreen").classList.remove("hidden");

  localStream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });

  document.getElementById("localPreview").srcObject=localStream;
}

/* ========= 参加 ========= */
function joinCall(){
  joinedMembers.add(myId);
  channel.publish("join",{id:myId});
}

channel.subscribe("join", msg=>{
  joinedMembers.add(msg.data.id);
  if(joinedMembers.has(myId) && joinedMembers.has(targetId)){
    startCall();
  }
});

/* ========= WebRTC ========= */
function createPeer(){
  peer = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  localStream.getTracks().forEach(track=>{
    peer.addTrack(track,localStream);
  });

  peer.ontrack = e=>{
    document.getElementById("remoteVideo").srcObject=e.streams[0];
  };

  peer.onicecandidate = e=>{
    if(e.candidate){
      channel.publish("signal",{
        type:"ice",
        candidate:e.candidate
      });
    }
  };
}

/* ========= 通話開始 ========= */
async function startCall(){

  document.getElementById("previewScreen").classList.add("hidden");
  document.getElementById("callScreen").classList.remove("hidden");

  document.getElementById("localVideo").srcObject=localStream;

  createPeer();

  const isCaller = myId < targetId;

  if(isCaller){
    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);
    channel.publish("signal",{type:"offer",offer});
  }
}

/* ========= シグナル受信 ========= */
channel.subscribe("signal", async msg=>{
  const data = msg.data;

  if(data.type==="offer"){
    if(!peer) createPeer();
    await peer.setRemoteDescription(
      new RTCSessionDescription(data.offer)
    );

    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    channel.publish("signal",{type:"answer",answer});
  }

  if(data.type==="answer"){
    await peer.setRemoteDescription(
      new RTCSessionDescription(data.answer)
    );
  }

  if(data.type==="ice"){
    if(peer){
      await peer.addIceCandidate(
        new RTCIceCandidate(data.candidate)
      );
    }
  }
});

/* ========= 操作 ========= */
function toggleMic(){
  localStream.getAudioTracks()[0].enabled=
  !localStream.getAudioTracks()[0].enabled;
}

function toggleCam(){
  localStream.getVideoTracks()[0].enabled=
  !localStream.getVideoTracks()[0].enabled;
}

function endCall(){
  if(peer) peer.close();
  location.reload();
}
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("service-worker.js");
  });
}
</script>
</body>
</html>
