<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Nexis Video</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f0f14">

<style>
body{
  margin:0;
  background:#0f0f14;
  color:white;
  font-family:sans-serif;
  text-align:center;
}
video{
  width:45%;
  background:black;
  border-radius:12px;
}
button{
  padding:15px;
  font-size:18px;
  margin:10px;
  border-radius:10px;
  border:none;
}
</style>
</head>
<body>

<h2>Nexis Video</h2>

<div id="status">接続中...</div>

<div>
  <video id="localVideo" autoplay playsinline muted></video>
  <video id="remoteVideo" autoplay playsinline></video>
</div>

<div>
  <div>
  <button onclick="joinCall()">参加</button>
  <button onclick="toggleMute()">🎤 ミュート</button>
  <button onclick="toggleCamera()">📷 カメラOFF</button>
  <button onclick="switchCamera()">🔄 切替</button>
  <button onclick="endCall()">❌ 終了</button>
</div>
</div>

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<script>
const ABLY_KEY = "JW3Hvw.fw1o0A:-zV3VatQkBUx-hVmtwFGE6Bwbv_wG4kIoz7LHOKNawY"; // ←入れて

let myId = localStorage.getItem("nexis_id");
if(!myId){
  myId = crypto.randomUUID();
  localStorage.setItem("nexis_id",myId);
}

const params = new URLSearchParams(location.search);
const targetId = params.get("to");

if(!targetId){
  document.getElementById("status").innerText="相手IDがありません";
  throw "no target";
}

const roomId = [myId,targetId].sort().join("-");

const ably = new Ably.Realtime({
  key: ABLY_KEY,
  clientId: myId
});

const channel = ably.channels.get(roomId);

let localStream;
let peer;
let joined = {};
let localVideo = document.getElementById("localVideo");
let remoteVideo = document.getElementById("remoteVideo");

async function initMedia(){
  if(!navigator.mediaDevices){
    alert("HTTPSで開いてください");
    return;
  }

  localStream = await navigator.mediaDevices.getUserMedia({
    video:true,
    audio:true
  });

  localVideo.srcObject = localStream;
}

initMedia();

channel.subscribe("signal", async msg=>{
  const data = msg.data;
  if(data.from === myId) return;

  if(data.offer){
    if(!peer) createPeer();

    await peer.setRemoteDescription(new RTCSessionDescription(data.offer));
    const answer = await peer.createAnswer();
    await peer.setLocalDescription(answer);

    channel.publish("signal",{answer,from:myId});
  }

  if(data.answer){
    await peer.setRemoteDescription(new RTCSessionDescription(data.answer));
  }

  if(data.candidate){
    await peer.addIceCandidate(new RTCIceCandidate(data.candidate));
  }
});

channel.subscribe("join", msg=>{
  joined[msg.data.id]=true;

  if(joined[myId] && joined[targetId]){
    if(!peer) startCall();
  }
});

function createPeer(){
  peer = new RTCPeerConnection({
    iceServers:[
      {urls:"stun:stun.l.google.com:19302"}
    ]
  });

  localStream.getTracks().forEach(track=>{
    peer.addTrack(track,localStream);
  });

  peer.ontrack = e=>{
    remoteVideo.srcObject = e.streams[0];
  };

  peer.onicecandidate = e=>{
    if(e.candidate){
      channel.publish("signal",{
        candidate:e.candidate,
        from:myId
      });
    }
  };
}

async function startCall(){
  createPeer();

  const offer = await peer.createOffer();
  await peer.setLocalDescription(offer);

  channel.publish("signal",{offer,from:myId});
}

function joinCall(){
  joined[myId]=true;
  channel.publish("join",{id:myId});
}
  let audioEnabled = true;
let videoEnabled = true;
let currentFacing = "user";

function toggleMute(){
  audioEnabled = !audioEnabled;
  localStream.getAudioTracks().forEach(track=>{
    track.enabled = audioEnabled;
  });
}

function toggleCamera(){
  videoEnabled = !videoEnabled;
  localStream.getVideoTracks().forEach(track=>{
    track.enabled = videoEnabled;
  });
}

async function switchCamera(){
  if(!navigator.mediaDevices) return;

  currentFacing = currentFacing === "user" ? "environment" : "user";

  const newStream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:currentFacing},
    audio:true
  });

  const videoTrack = newStream.getVideoTracks()[0];
  const sender = peer.getSenders().find(s=>s.track.kind==="video");
  sender.replaceTrack(videoTrack);

  localStream.getTracks().forEach(t=>t.stop());
  localStream = newStream;
  localVideo.srcObject = newStream;
}

function endCall(){
  if(peer){
    peer.close();
    peer=null;
  }
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
  }
  location.reload();
}
</script>

</body>
</html>
